<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Night Picnic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #6b6b6b;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="app-frame" allow="fullscreen" loading="lazy"></iframe>

  <script>
    // GASのデプロイURL（末尾スラッシュなし）
    var GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbxE-4fCdb4Wo1jOTVBm2t08MaA68aI2TiirRIUXl6EzgYpKNU7SfW8GxBCncP2CGdJu/exec';

    // 現在のURLパラメータをすべてGASに転送する
    var params = new URLSearchParams(window.location.search);
    params.set('embedded', 'true');

    document.getElementById('app-frame').src = GAS_BASE_URL + '?' + params.toString();

    // iframeがtitle変更をリクエストしてきた場合に対応（オプション）
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'setTitle') {
        document.title = event.data.title;
      }
    });
  </script>
</body>
</html>
