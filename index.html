<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Night Picnic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #6b6b6b;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: none;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #6b6b6b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #F5E040;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <iframe id="app-frame" allow="fullscreen"></iframe>

  <script>
    // GASのデプロイURL（末尾スラッシュなし）
    var GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbxE-4fCdb4Wo1jOTVBm2t08MaA68aI2TiirRIUXl6EzgYpKNU7SfW8GxBCncP2CGdJu/exec';

    var params = new URLSearchParams(window.location.search);
    params.set('embedded', 'true');

    var frame = document.getElementById('app-frame');
    var loadingScreen = document.getElementById('loading-screen');

    frame.addEventListener('load', function() {
      loadingScreen.classList.add('fade-out');
      setTimeout(function() {
        loadingScreen.style.display = 'none';
      }, 400);
    });

    frame.src = GAS_BASE_URL + '?' + params.toString();

    // iframeがtitle変更をリクエストしてきた場合に対応（オプション）
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'setTitle') {
        document.title = event.data.title;
      }
    });
  </script>
</body>
</html>
